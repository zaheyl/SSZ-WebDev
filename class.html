<!DOCTYPE html>
<html>
    <head>
        <title>My First Website</title>
        <style>
            h1{
                color: blue;
            }
            p{
                font-size: 20px;
            }
            .button1{
                background-color: green;
                color:white;
                border: 2px;
                padding:20px;
                border-radius: 100px;
            }
            .button1:hover{
                cursor:pointer;
                color:yellow;
                background-color: red;
            }
            #button2:active{
                cursor:pointer;
                color:rgb(157, 157, 2);
                background-color: rgb(1, 161, 92);
            }
        </style>
    </head>
    <body>
        <h1>This is the very first website I created</h1>
        <h3>This is smaller header</h3>
        <p>This is a paragraph</p>
        <br><br>
        <input type="text" placeholder="Please enter any text?!">
        <br><br>
        <button class="button1" onClick="showMessage()">Click Me</button>
        <button id="button2">Do Not Click Me</button>
        <br><br>
        <a href="https://www.youtube.com/" target="_blank">This is a link</a>
        <br><br>
        <!--This is comment-->

        <!--
            <img src="photo/spongebob-1.jpeg">
        -->

        <script>
            function showMessage() {
                alert("This button is clicked!");
            }

            let age = 5;

            if (age >= 20) {
                console.log(age);
            } else {
                console.log("Underage", age);
            }
        </script>
    </body>
</html>
